name: senlegal-prod

# SenLégal — stack PROD complète et autonome
# Build des images ai/backend/frontend depuis le repo GitHub privé via le
# contexte Git de BuildKit, en passant un GITHUB_TOKEN.
#
# Usage:
#   cp .env.prod.example .env.prod   # remplir les secrets
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: senlegal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER manquant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}
      POSTGRES_DB: ${POSTGRES_DB:-senlegal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-senlegal}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: senlegal_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY manquant}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY manquant}
      # Doit correspondre à S3_PUBLIC_URL : MinIO valide les signatures contre
      # cet hôte. Si vide, MinIO accepte n'importe quel host mais les liens
      # générés par le backend peuvent pointer sur le hostname interne.
      MINIO_SERVER_URL: ${S3_PUBLIC_URL:?S3_PUBLIC_URL manquant - ex https://files.senlegal.sn}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_PUBLIC_URL:-${S3_PUBLIC_URL}}
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: senlegal_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
        mc mb -p local/${S3_BUCKET:-senlegal} || true &&
        mc anonymous set none local/${S3_BUCKET:-senlegal} &&
        echo 'minio init done.'
      "
    restart: "no"

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: senlegal_chromadb
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      ALLOW_RESET: "FALSE"
    volumes:
      - chromadata:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "/bin/sh",
          "-c",
          "curl -fsS http://localhost:8000/api/v2/heartbeat || curl -fsS
            http://localhost:8000/api/v1/heartbeat",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ai:
    image: ${REGISTRY:-senlegal}/ai:${IMAGE_TAG:-${GITHUB_REF:-latest}}
    build:
      context: https://x-access-token:${GITHUB_TOKEN:?GITHUB_TOKEN manquant - PAT ou
        installation token}@github.com/${GITHUB_REPO:?GITHUB_REPO manquant -
        format org/repo}.git#${GITHUB_REF:-main}:ai
      dockerfile: Dockerfile
    pull_policy: build
    container_name: senlegal_ai
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: "8001"
      CORS_ORIGINS: ${AI_CORS_ORIGINS:-${APP_PUBLIC_URL}}
      ADMIN_TOKEN: ${AI_ADMIN_TOKEN:?AI_ADMIN_TOKEN manquant}
      OLLAMA_HOST: ${OLLAMA_HOST:-https://ollama.com}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:?OLLAMA_API_KEY manquant}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      MODEL_NAME: ${MODEL_NAME:-gemma4:31b-cloud}
      EMBED_MODEL: ${EMBED_MODEL:-intfloat/multilingual-e5-small}
      COLLECTION_NAME: ${COLLECTION_NAME:-senlegal_v1}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_SSL: "false"
      PROCESSED_DIR: /data/processed
      ASSETS_DIR: /assets
      TOP_K: ${TOP_K:-5}
      MIN_SCORE: ${MIN_SCORE:-0.35}
      MAX_CHUNK_CHARS: ${MAX_CHUNK_CHARS:-1500}
      MAX_NEW_TOKENS: ${MAX_NEW_TOKENS:-512}
      TEMPERATURE: ${TEMPERATURE:-0.1}
      REPETITION_PENALTY: ${REPETITION_PENALTY:-1.1}
    volumes:
      - ai_data:/data
      - ai_assets:/assets
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8001/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    image: ${REGISTRY:-senlegal}/backend:${IMAGE_TAG:-${GITHUB_REF:-latest}}
    build:
      context: https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git#${GITHUB_REF:-main}:backend
      dockerfile: Dockerfile
    pull_policy: build
    container_name: senlegal_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-senlegal}?schema=public
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL manquant}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:?WEB_PUBLIC_URL manquant}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS manquant}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET manquant}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: "12"
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL manquant}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD manquant}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur SenLégal}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      AI_BASE_URL: http://ai:8001
      AI_API_KEY: ""
      AI_ADMIN_TOKEN: ${AI_ADMIN_TOKEN}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:?S3_PUBLIC_URL manquant}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-senlegal}
      S3_FORCE_PATH_STYLE: "true"
      MAX_AVATAR_SIZE_MB: "2"
      MAX_USER_DOCUMENT_SIZE_MB: "25"
      MAX_RAG_DOCUMENT_SIZE_MB: "100"
      MAX_CHAT_ATTACHMENT_SIZE_MB: "10"
      FREE_DAILY_CHAT_LIMIT: "5"
      FREE_USER_STORAGE_MB: "50"
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST manquant}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-SenLégal <no-reply@senlegal.sn>}
      SUBSCRIPTIONS_SCHEDULER_ENABLED: "true"
      PAYDUNYA_MASTER_KEY: ${PAYDUNYA_MASTER_KEY:-}
      PAYDUNYA_PRIVATE_KEY: ${PAYDUNYA_PRIVATE_KEY:-}
      PAYDUNYA_TOKEN: ${PAYDUNYA_TOKEN:-}
      PAYDUNYA_MODE: ${PAYDUNYA_MODE:-live}
      PAYDUNYA_STORE_NAME: ${PAYDUNYA_STORE_NAME:-SenLégal}
      PRICE_PRO_AMOUNT_XOF: ${PRICE_PRO_AMOUNT_XOF:-9900}
      PRICE_PRO_DURATION_MONTHS: ${PRICE_PRO_DURATION_MONTHS:-1}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${REGISTRY:-senlegal}/frontend:${IMAGE_TAG:-${GITHUB_REF:-latest}}
    build:
      context: https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git#${GITHUB_REF:-main}:frontend
      dockerfile: Dockerfile
    pull_policy: build
    container_name: senlegal_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: "3000"
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-${APP_PUBLIC_URL}/api}
      # Optionnel : proxy Nitro (remplacer la ligne ci-dessus par /api si activé)
      # NUXT_API_PROXY_TARGET: http://backend:3001
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Reverse proxy Caddy (TLS auto via Let's Encrypt).
  # Désactiver avec --profile no-proxy si tu utilises déjà nginx/traefik en amont.
  caddy:
    image: caddy:2-alpine
    container_name: senlegal_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - minio
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN manquant - ex senlegal.sn}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN manquant - ex api.senlegal.sn}
      FILES_DOMAIN: ${FILES_DOMAIN:?FILES_DOMAIN manquant - ex files.senlegal.sn}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL manquant}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  miniodata:
  ai_data:
  ai_assets:
  chromadata:
  caddy_data:
  caddy_config:
